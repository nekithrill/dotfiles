# Set the visual theme matching your dark layout
color_theme = "Default"

# Update energy sampling frequency rate in milliseconds (1500ms is standard and efficient)
update_ms = 1500

# Show temperature in Celsius
temp_scale = "celsius"

# Default view preset (0-3)
# 0 = full, 1 = proc, 2 = stat, 3 = gpu
shown_boxes = "cpu mem net proc"

# Graph styling aesthetics
graph_symbol = "braille"
clock_format = "%X"

# Show CPU frequency
show_cpu_freq = True

# Show battery charge status levels inside the CPU panel (crucial for laptops)
show_battery = true
selected_battery = "Auto"
