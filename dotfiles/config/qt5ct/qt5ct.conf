# =============================================================================
# hypr-starter/config/qtXct/qtXct.conf
# Maps Qt application styling directly to the Kvantum theme engine
# =============================================================================

[Appearance]
# Force Qt applications to use the Kvantum style engine for drawing widgets
style=kvantum
# Set Papirus-Dark as the default fallback icon theme for Qt apps
icon_theme=Papirus-Dark

[Fonts]
# Force JetBrainsMono Nerd Font across all standard Qt text interfaces
General="JetBrainsMono Nerd Font,10,-1,5,50,0,0,0,0,0,Regular"
Fixed="JetBrainsMono Nerd Font,10,-1,5,50,0,0,0,0,0,Regular"

[Interface]
# Enable standard double-click interval and modern scrolling behaviors
double_click_interval=400
cursor_flash_time=1000
wheel_scroll_lines=3
# Embed standard file dialogs instead of breaking themes inside window managers
stylesheets=@Invalid()

[Troubleshooting]
# Disable heavy runtime tracing to keep the terminal logs clean
ignored_signals=0
