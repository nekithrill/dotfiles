# --- Video -------------------------------------------------------------------

# Hardware video decoding (auto-detects best method)
hwdec = auto-safe

# High quality scaling
scale = ewa_lanczossharp
cscale = ewa_lanczossharp
dscale = mitchell

# Deband (reduces color banding on gradients)
deband = yes

# --- Audio -------------------------------------------------------------------

# Default volume
volume = 80

# Normalize audio
af = loudnorm

# --- Subtitles ---------------------------------------------------------------

# Default subtitle language
slang = en,eng,ru,rus

# Subtitle font and size
sub-font = "JetBrainsMono Nerd Font"
sub-font-size = 42
sub-color = "#FFFFFF"
sub-border-color = "#000000"
sub-border-size = 2
sub-shadow-offset = 1

# --- Behavior ----------------------------------------------------------------

# Save position on quit
save-position-on-quit = yes

# Resume from last position
resume-playback = yes

# Loop playlist
# loop-playlist = inf

# Screenshot format and location
screenshot-format = png
screenshot-directory = ~/Pictures/Screenshots
screenshot-template = "%F_%P"

keep-open=yes