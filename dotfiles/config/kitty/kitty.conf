# =============================================================================
# hypr-starter/config/kitty/kitty.conf
# Core configurations for Kitty terminal emulator
# =============================================================================

# --- Fonts -------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout & Aesthetics ----------------------------------------------
# Subtle background opacity and blur (blur matches hyprland appearance configs)
background_opacity 0.85
background_blur    1

# Remove standard window decorations and title bars (Hyprland handles borders)
hide_window_decorations yes
window_padding_width    10

# --- Color Scheme (Smooth Dark Palette matching Waybar & Fuzzel) -------------
background            #1e1e2e
foreground            #cdd6f4
selection_background  #313244
selection_foreground  #cdd6f4
url_color             #33ccff

# Terminal active border glow
active_border_color   #33ccff
inactive_border_color #45475a

# --- Mouse & Cursor ----------------------------------------------------------
cursor                #33ccff
cursor_text_color     #11111b
cursor_shape          beam
cursor_blink_interval 0.5
detect_urls           yes

# --- Scrollback Buffer -------------------------------------------------------
scrollback_lines 5000

# --- System Performance ------------------------------------------------------
# Sync frame rendering rates directly to your laptop screen refresh rates
repaint_delay    10
input_delay      3
sync_to_monitor  yes
