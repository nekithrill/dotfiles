# Preload the image asset into video memory cache
# We use the standard fallback background graphic provided by the system
preload = /usr/share/backgrounds/archlinux/simple-dark-gray.png

# Set the wallpaper for all active discovered monitors
wallpaper = ,/usr/share/backgrounds/archlinux/simple-dark-gray.png

# Fully disable splash text rendering on top of the wallpaper graphic
splash = false
