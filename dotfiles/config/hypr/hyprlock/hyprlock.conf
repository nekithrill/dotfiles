# =============================================================================
# hypr-starter/config/hypr/hyprlock.conf
# Minimal and modern screen lock layout
# =============================================================================

background {
    monitor =
    path = screenshot                           # Take a live screenshot of the current workspace
    blur_passes = 3                             # Apply strong blur effect to hide open windows
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25                            # Size of input dots inside field
    dots_spacing = 0.15                         # Spacing between dots
    dots_center = true
    
    outer_color = rgba(33ccffee)                # Match active border color from appearance.conf
    inner_color = rgba(25, 24, 38, 0.8)         # Dark translucent input field background
    font_color = rgba(198, 208, 245, 1.0)
    fade_on_empty = false
    
    placeholder_text = <i>Enter Password...</i>  # Text displayed when empty
    hide_input = false
    
    position = 0, -20
    halign = center
    valign = center
}

# --- Time Display Label ------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(198, 208, 245, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, 100
    halign = center
    valign = center
}

# --- Date Display Label ------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(198, 208, 245, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 40
    halign = center
    valign = center
}
