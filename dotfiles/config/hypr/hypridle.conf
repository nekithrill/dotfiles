# =============================================================================
# hypr-starter/config/hypr/hypridle.conf
# Idle management daemon configuration (Battery saving & Screen lock)
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock       # Command to lock the screen safely
    before_sleep_cmd = loginctl lock-session    # Lock the desktop session before the system goes to sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Force screen back on after waking up from sleep
}

# --- Listener 1: Dim the display screen ---------------------------------------
listener {
    timeout = 150                               # 2.5 minutes of idle time
    on-timeout = brightnessctl set 10%          # Drop display backlight to 10% to save laptop battery
    on-resume = brightnessctl set 100%          # Restore full brightness on mouse movement / keypress
}

# --- Listener 2: Trigger the screen lock -------------------------------------
listener {
    timeout = 300                               # 5 minutes of idle time
    on-timeout = loginctl lock-session          # Fire the lock_cmd (triggers hyprlock)
}

# --- Listener 3: Turn off the screen completely -----------------------------
listener {
    timeout = 330                               # 5.5 minutes of idle time (30s after locking)
    on-timeout = hyprctl dispatch dpms off      # Turn off monitor signal via DPMS
    on-resume = hyprctl dispatch dpms on        # Wake up monitor signal immediately on resume
}

# --- Listener 4: Suspend the laptop ------------------------------------------
listener {
    timeout = 600                               # 10 minutes of idle time
    on-timeout = systemctl suspend              # Put the system to sleep (Suspend to RAM)
}
